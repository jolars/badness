[package]
name = "badness"
version = "0.3.0"
edition = "2024"
readme = "README.md"
description = "An LSP, formatter, and linter for LaTeX"
license = "MIT"
repository = "https://github.com/jolars/badness"
homepage = "https://jolars.github.io/badness/"
authors = ["Johan Larsson <johan@jolars.co>"]
keywords = ["latex", "language-server", "formatter", "linter"]
categories = [
  "command-line-utilities",
  "text-processing",
  "parsing",
  "parser-implementations",
]

[lib]
name = "badness"

[[bin]]
name = "badness"
path = "src/main.rs"

# Dependency versions are kept in lockstep with the sibling project `arity`
# (../arity) so the eventual shared-crate extraction stays a mechanical lift.
# Deps are added phase by phase (salsa, lsp-server, clap, … land with their
# phases) to keep `cargo machete` clean.
[dependencies]
annotate-snippets = "0.12.16"
clap = { version = "4.5.51", features = ["derive"] }
crossbeam-channel = "0.5"
ignore = "0.4.26"
log = { version = "0.4.32", features = ["release_max_level_info"] }
lsp-server = "0.7"
lsp-types = "0.97"
rowan = "0.16.1"
salsa = "0.27.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smol_str = "0.3.2"

[dev-dependencies]
insta = "1.47.2"
tempfile = "3"
# Differential parse oracle (tests/parse_oracle.rs, tests/parse_compat.rs).
texlab-parser = { git = "https://github.com/latex-lsp/texlab", package = "parser", rev = "adc91ff8a3b56ba4b72c489db33f32cfbb8b2c5c" }
texlab-syntax = { git = "https://github.com/latex-lsp/texlab", package = "syntax", rev = "adc91ff8a3b56ba4b72c489db33f32cfbb8b2c5c" }
